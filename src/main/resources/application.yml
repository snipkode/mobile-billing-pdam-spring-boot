server:
  port: 8082
  servlet:
    context-path: /v1

spring:
  application:
    name: billing
  datasource:
    url: jdbc:h2:file:${user.home}/pdam-db/billing;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  profiles:
    active: h2

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000
  cors:
    allowed-origins: "*"
  waha:
    url: ${WAHA_URL:http://localhost:3001}
    api-key: ${WAHA_API_KEY:waha-pdam-secret}
    session: ${WAHA_SESSION:pdam}
  otp:
    expiry-minutes: 5
