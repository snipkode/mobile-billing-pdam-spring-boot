server:
  port: 8081
  servlet:
    context-path: /v1

spring:
  application:
    name: billing
  datasource:
    url: jdbc:h2:mem:pdam
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  profiles:
    active: h2

app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    expiration: 86400000
  cors:
    allowed-origins: "*"
